name: MIZAR Daily Health Report

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify health report script exists
        run: |
          if [ ! -f workers/atlas_daily_report.py ]; then
            echo "ERROR: workers/atlas_daily_report.py not found"
            echo "Available worker files:"
            ls -la workers/
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase httpx

      - name: Run daily report
        env:
          MIZAR_SUPABASE_URL: ${{ secrets.MIZAR_SUPABASE_URL }}
          MIZAR_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MIZAR_SUPABASE_SERVICE_ROLE_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python workers/atlas_daily_report.py

      - name: Run alert checks
        id: alerts
        env:
          MIZAR_SUPABASE_URL: ${{ secrets.MIZAR_SUPABASE_URL }}
          MIZAR_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MIZAR_SUPABASE_SERVICE_ROLE_KEY }}
        run: python workers/atlas_alerts.py

      - name: Send Slack alert
        if: always() && steps.alerts.outputs.has_alerts == 'true'
        uses: slackapi/slack-github-action@v2
        with:
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack_payload.json
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}