name: Recalibrate v3 Model

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recalibrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout traveltxter
        uses: actions/checkout@v4

      - name: Checkout mizar-api
        uses: actions/checkout@v4
        with:
          repository: greenroomman/mizar-api
          token: ${{ secrets.GH_PAT }}
          path: mizar-api-checkout

      - name: Prepare mizar-api path expected by script
        run: |
          mkdir -p "$HOME/mizar-api"
          cp -R mizar-api-checkout/. "$HOME/mizar-api/"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "supabase>=2.0.0" "scikit-learn>=1.3,<1.6" numpy pandas joblib python-dotenv

      - name: Run recalibration audit
        env:
          MIZAR_SUPABASE_URL: ${{ secrets.MIZAR_SUPABASE_URL }}
          MIZAR_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MIZAR_SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 workers/recalibrate_v3.py

      - name: Copy artefact back to workspace
        if: success()
        run: cp "$HOME/mizar-api/atlas_regret_risk_v3_0_1_recalibrated.joblib" ./atlas_regret_risk_v3_0_1_recalibrated.joblib

      - name: Upload recalibrated model artefact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: atlas_regret_risk_v3_0_1_recalibrated
          path: atlas_regret_risk_v3_0_1_recalibrated.joblib
          retention-days: 30
