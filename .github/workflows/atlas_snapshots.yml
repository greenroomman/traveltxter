name: Atlas Snapshots

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:

  capture:
    name: Capture Snapshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Run capture
        env:
          SUPABASE_URL: ${{ secrets.MIZAR_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.MIZAR_SUPABASE_SERVICE_ROLE_KEY }}
          DUFFEL_ACCESS_TOKEN: ${{ secrets.DUFFEL_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          ATLAS_MAX_SEARCHES: 157
        run: python workers/atlas_snapshot_capture.py

  backfill:
    name: Backfill Outcomes
    runs-on: ubuntu-latest
    needs: capture
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Run backfill
        env:
          SUPABASE_URL: ${{ secrets.MIZAR_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.MIZAR_SUPABASE_SERVICE_ROLE_KEY }}
        run: python workers/atlas_snapshot_backfill.py

  market_signals:
    name: Market Signals
    runs-on: ubuntu-latest
    needs: capture
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Run market signals
        env:
          SUPABASE_URL: ${{ secrets.MIZAR_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.MIZAR_SUPABASE_SERVICE_ROLE_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python workers/atlas_market_signals.py