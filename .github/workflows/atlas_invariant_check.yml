name: MIZAR Commercial Invariant Check

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  invariant-check:
    name: Commercial Invariant Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase

      - name: Run invariant check
        env:
          MIZAR_SUPABASE_URL: ${{ secrets.MIZAR_SUPABASE_URL }}
          MIZAR_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MIZAR_SUPABASE_SERVICE_ROLE_KEY }}
        run: python workers/atlas_invariant_check.py
